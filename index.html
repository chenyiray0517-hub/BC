<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC 戰隊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .hero h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(100, 180, 255, 0.5);
    }

    .hero h1 span {
      color: #5aa8ff;
    }

    .hero p {
      margin-top: 12px;
      font-size: 1rem;
      color: #666;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .menu {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 20px;
    }

    .menu-card {
      width: 180px;
      height: 200px;
      background: #111118;
      border: 1px solid #1e1e30;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .menu-card:hover {
      transform: translateY(-6px);
      border-color: #5aa8ff;
      box-shadow: 0 8px 32px rgba(90, 168, 255, 0.2);
    }

    .menu-card.register-card {
      background: #111118;
      border-color: #1e301e;
    }
    .menu-card.register-card:hover {
      border-color: #5aff8a;
      box-shadow: 0 8px 32px rgba(90, 255, 138, 0.2);
    }
    .menu-card.register-card:hover .label {
      color: #5aff8a;
    }

    .menu-card .icon {
      font-size: 2.8rem;
    }

    .menu-card .label {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #d0d0d0;
    }

    .menu-card:hover .label {
      color: #5aa8ff;
    }

    footer {
      position: fixed;
      bottom: 20px;
      font-size: 0.75rem;
      color: #333;
      letter-spacing: 0.1em;
    }

    /* ── Registration Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .reg-modal {
      background: #111118;
      border: 1px solid #2a3a60;
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 420px;
      max-width: 92vw;
      position: relative;
    }

    .reg-modal .close-btn {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      color: #555;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }
    .reg-modal .close-btn:hover { color: #fff; }

    .reg-modal h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: 0.08em;
    }

    .reg-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-label {
      font-size: 0.78rem;
      color: #888;
      letter-spacing: 0.1em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .form-input,
    .form-select {
      background: #0d0d18;
      border: 1px solid #2a3050;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: #3a3a50; }
    .form-input:focus,
    .form-select:focus {
      border-color: #5aff8a;
      box-shadow: 0 0 0 2px rgba(90, 255, 138, 0.08);
    }
    .form-select option { background: #111118; }

    .submit-btn {
      margin-top: 10px;
      padding: 12px;
      background: linear-gradient(135deg, #172a1c, #0f2015);
      border: 1px solid #5aff8a;
      border-radius: 10px;
      color: #5aff8a;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      background: linear-gradient(135deg, #1e3a26, #142a1a);
      box-shadow: 0 4px 20px rgba(90, 255, 138, 0.18);
    }

    .success-msg {
      display: none;
      text-align: center;
      padding: 28px 20px;
      color: #5aff8a;
    }
    .success-msg .check-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 14px;
    }
    .success-msg .check-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .success-msg .check-sub {
      font-size: 0.85rem;
      color: #5a8870;
      letter-spacing: 0.04em;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="hero">
    <h1>BC <span>戰隊</span></h1>
    <p>Battle Corps · Official Portal</p>
  </div>

  <nav class="menu">
    <a href="members.html" class="menu-card">
      <div class="icon">⚔️</div>
      <div class="label">成員</div>
    </a>
    <a href="examiners.html" class="menu-card">
      <div class="icon">🎖️</div>
      <div class="label">考官</div>
    </a>
    <a href="leaderboard.html" class="menu-card">
      <div class="icon">🏆</div>
      <div class="label">排行榜</div>
    </a>
    <button class="menu-card register-card" onclick="openRegModal()">
      <div class="icon">📋</div>
      <div class="label">報名考試</div>
    </button>
  </nav>

  <!-- Registration Modal -->
  <div class="modal-overlay" id="regModalOverlay">
    <div class="reg-modal">
      <button class="close-btn" onclick="closeRegModal()">✕</button>
      <h2>📋 報名考試</h2>

      <form class="reg-form" id="regForm" onsubmit="submitReg(event)">
        <div class="form-group">
          <label class="form-label">Roblox 暱稱</label>
          <input class="form-input" id="robloxName" required placeholder="輸入 Roblox 暱稱" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">Roblox ID</label>
          <input class="form-input" id="robloxId" required placeholder="輸入 Roblox ID" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">FB 名字</label>
          <input class="form-input" id="fbName" required placeholder="輸入 Facebook 名字" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">報考科目</label>
          <select class="form-select" id="subject" required>
            <option value="">— 請選擇科目 —</option>
            <option value="BC 小刀">⚔️ BC 小刀</option>
            <option value="DL">🔫 DL（雙槍）</option>
            <option value="CL">🎯 CL（單槍）</option>
            <option value="狙擊">🔭 狙擊</option>
          </select>
        </div>
        <button type="submit" class="submit-btn">確認報名</button>
      </form>

      <div class="success-msg" id="successMsg">
        <span class="check-icon">✅</span>
        <div class="check-title">報名成功！</div>
        <div class="check-sub">考官將與您聯絡，請耐心等候。</div>
      </div>
    </div>
  </div>

  <footer>BC 戰隊 · 2026</footer>

  <script>
    // ── 貼上你的 Firebase 設定 ──────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyBtAuBr9S1S9wIoor4RqF_WFvRyaQagKpA",
      authDomain:        "bc-team-14516.firebaseapp.com",
      projectId:         "bc-team-14516",
      storageBucket:     "bc-team-14516.firebasestorage.app",
      messagingSenderId: "609885248341",
      appId:             "1:609885248341:web:61f88d7b7dc5ccad176ddc"
    };
    // ────────────────────────────────────────────────────────
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function openRegModal() {
      document.getElementById('regModalOverlay').classList.add('show');
    }

    function closeRegModal() {
      document.getElementById('regModalOverlay').classList.remove('show');
      document.getElementById('regForm').reset();
      const btn = document.querySelector('.submit-btn');
      btn.textContent = '確認報名';
      btn.disabled = false;
      document.getElementById('regForm').style.display = 'flex';
      document.getElementById('successMsg').style.display = 'none';
    }

    async function submitReg(e) {
      e.preventDefault();
      const btn = document.querySelector('.submit-btn');
      btn.textContent = '送出中…';
      btn.disabled = true;

      const reg = {
        robloxName: document.getElementById('robloxName').value.trim(),
        robloxId:   document.getElementById('robloxId').value.trim(),
        fbName:     document.getElementById('fbName').value.trim(),
        subject:    document.getElementById('subject').value,
        timestamp:  firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await db.collection('registrations').add(reg);
        document.getElementById('regForm').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
        setTimeout(closeRegModal, 2600);
      } catch (err) {
        console.error(err);
        btn.textContent = '確認報名';
        btn.disabled = false;
        alert('報名失敗，請稍後再試。');
      }
    }

    document.getElementById('regModalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeRegModal();
    });
  </script>

</body>
</html>
